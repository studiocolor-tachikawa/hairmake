<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>スタジオカラー撮影空き状況</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <img src="./img/logo-white.png" alt="" />
    </header>
    <h2 class="reserve-title">【スタジオカラー 撮影予約状況】</h2>
    <div class="notice-container">
      <section class="notice" role="note" aria-label="撮影予約に関するご案内">
        <ul class="notice-list">
          <li>
            <span class="noticeword">⚫︎</span
            >撮影は【14:00〜20:00（最終受付）】までです。
          </li>
          <li>
            <span class="noticeword">⚫︎</span
            >ヘアメイクは14:00〜18:00までの受付になります
          </li>
          <li>
            <span class="noticeword">⚫︎</span
            >ヘアメイクの都合により、空きがあっても撮影できない場合があります。
          </li>
          <li>
            <span class="noticeword">※この画面から直接予約はできません。</span
            ><br />
            <span class="noticeword">⚫︎</span
            >空き状況を確認のうえ、LINEで【日時・ヘアメ有無・女性の名前・撮影用途】をお伝えください。
          </li>
        </ul>
      </section>
      <iframe
        src="https://calendar.google.com/calendar/embed?src=corefusion.info%40gmail.com&ctz=Asia%2FTokyo&hl=ja&mode=WEEK&wkst=2&showTabs=0&showCalendars=0&showTz=0&showPrint=0&showTitle=0&showDate=1&showNav=1"
        style="border: 0"
        width="100%"
        height="900"
        frameborder="0"
        scrolling="no"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      >
      </iframe>
    </div>
    <div class="lineArea">
      <p>立川スタジオカラーのLINE登録がまだの方はこちら</p>
      <a href="https://lin.ee/Trkrtuvc">LINE登録</a>
    </div>
  </body>
</html>
